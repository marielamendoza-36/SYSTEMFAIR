<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Ysidro STEM Fair</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #1a7a3c;
      --green-light: #2ecc71;
      --blue: #1565c0;
      --magenta: #c2185b;
      --yellow: #f9c22e;
      --bg: #f0f4f0;
      --surface: #ffffff;
      --text: #1a2e1a;
      --border: #c8dbc8;
      --shadow: 0 4px 24px rgba(26,122,60,0.13);
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
 
    /* ── HEADER ── */
    header {
      background: var(--green);
      color: #fff;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      z-index: 10;
    }
 
    .header-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
 
    .header-title h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      letter-spacing: 0.04em;
      color: var(--yellow);
      line-height: 1;
    }
 
    .header-title span {
      font-size: 0.8rem;
      font-weight: 500;
      opacity: 0.75;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
 
    .header-badge {
      background: var(--yellow);
      color: var(--green);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      border-radius: 20px;
    }
 
    /* ── TOOLBAR ── */
    .toolbar {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
 
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }
 
    .btn:hover {
      background: #e8f5ed;
      border-color: var(--green);
      color: var(--green);
    }
 
    .btn:active { transform: scale(0.96); }
 
    .btn.primary {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
 
    .btn.primary:hover {
      background: #145c2d;
      border-color: #145c2d;
      color: #fff;
    }
 
    .zoom-display {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--green);
      min-width: 52px;
      text-align: center;
      background: #e8f5ed;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px;
    }
 
    .toolbar-sep {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }
 
    .hint {
      font-size: 0.76rem;
      color: #6b886b;
      margin-left: auto;
      font-style: italic;
    }
 
    /* ── MAP CONTAINER ── */
    .map-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background:
        radial-gradient(circle at 20% 30%, rgba(46,204,113,0.06) 0%, transparent 60%),
        radial-gradient(circle at 80% 70%, rgba(21,101,192,0.05) 0%, transparent 60%),
        var(--bg);
    }
 
    .map-wrapper.grabbing { cursor: grabbing; }
 
    .map-canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      will-change: transform;
      transition: transform 0.04s linear;
    }
 
    .map-canvas img {
      display: block;
      max-width: none;
      user-select: none;
      pointer-events: none;
      border-radius: 4px;
      box-shadow: var(--shadow);
    }
 
    /* ── MINI-MAP ── */
    .minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 160px;
      height: 120px;
      background: rgba(255,255,255,0.92);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      z-index: 5;
    }
 
    .minimap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
      display: block;
    }
 
    .minimap-viewport {
      position: absolute;
      border: 2px solid var(--magenta);
      background: rgba(194,24,91,0.12);
      border-radius: 3px;
      pointer-events: none;
    }
 
    .minimap-label {
      position: absolute;
      top: 4px; left: 6px;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      background: rgba(255,255,255,0.8);
      padding: 1px 4px;
      border-radius: 3px;
    }
 
    /* ── ZOOM SLIDER ── */
    .zoom-slider-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }
 
    input[type=range] {
      -webkit-appearance: none;
      width: 90px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--green) 0%, var(--border) 0%);
      outline: none;
      cursor: pointer;
    }
 
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--green);
      border: 2px solid #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
 
    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }
 
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
 
    /* ── FULLSCREEN OVERLAY HINT ── */
    @media (max-width: 600px) {
      .hint { display: none; }
      header { height: 52px; }
      .header-title h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-title">
    <h1>San Ysidro STEM Fair</h1>
  </div>
  <div class="header-badge">April 17 · Smythe Elementary</div>
</header>
 
<div class="toolbar">
  <button class="btn" id="zoomOut" title="Zoom Out">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    Zoom Out
  </button>
 
  <div class="zoom-slider-wrap">
    <input type="range" id="zoomSlider" min="0.3" max="5" step="0.05" value="1" />
  </div>
 
  <button class="btn" id="zoomIn" title="Zoom In">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
    Zoom In
  </button>
 
  <span class="zoom-display" id="zoomLevel">100%</span>
 
  <div class="toolbar-sep"></div>
 
  <button class="btn primary" id="resetBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.65"/></svg>
    Reset View
  </button>
 
  <button class="btn" id="fitBtn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    Fit to Screen
  </button>
 
  <span class="hint">🖱 Scroll to zoom · Click &amp; drag to pan · Pinch on mobile</span>
</div>
 
<div class="map-wrapper" id="mapWrapper">
  <div class="map-canvas" id="mapCanvas">
    <img id="mapImg" src="SY_STEM_FAIR_2026_map.png" alt="San Ysidro STEM Fair 2026 Layout Map" draggable="false" />
  </div>
 
  <div class="minimap" id="minimap">
    <img src="SY_STEM_FAIR_2026_map.png" alt="Mini map" />
    <div class="minimap-viewport" id="minimapViewport"></div>
    <div class="minimap-label">Overview</div>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
  const wrapper   = document.getElementById('mapWrapper');
  const canvas    = document.getElementById('mapCanvas');
  const img       = document.getElementById('mapImg');
  const zoomLevel = document.getElementById('zoomLevel');
  const slider    = document.getElementById('zoomSlider');
  const minimap   = document.getElementById('minimap');
  const mmVP      = document.getElementById('minimapViewport');
  const toast     = document.getElementById('toast');
 
  let scale = 1;
  let originX = 0, originY = 0;
  let isDragging = false;
  let startX, startY, startOriginX, startOriginY;
  let toastTimer;
 
  const MIN_SCALE = 0.2;
  const MAX_SCALE = 6;
  const ZOOM_STEP = 0.2;
 
  // ── Apply transform ──────────────────────────────────────────
  function applyTransform(animate = false) {
    if (animate) {
      canvas.style.transition = 'transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94)';
    } else {
      canvas.style.transition = 'none';
    }
    canvas.style.transform = `translate(${originX}px, ${originY}px) scale(${scale})`;
    zoomLevel.textContent = Math.round(scale * 100) + '%';
    slider.value = scale;
    updateSliderFill();
    updateMinimap();
  }
 
  function updateSliderFill() {
    const pct = ((scale - parseFloat(slider.min)) / (parseFloat(slider.max) - parseFloat(slider.min))) * 100;
    slider.style.background = `linear-gradient(to right, var(--green) ${pct}%, var(--border) ${pct}%)`;
  }
 
  // ── Clamp pan to keep map somewhat visible ───────────────────
  function clampOrigin() {
    const iw = img.naturalWidth * scale;
    const ih = img.naturalHeight * scale;
    const ww = wrapper.clientWidth;
    const wh = wrapper.clientHeight;
    const pad = 80;
    originX = Math.min(ww - pad, Math.max(pad - iw, originX));
    originY = Math.min(wh - pad, Math.max(pad - ih, originY));
  }
 
  // ── Minimap viewport ─────────────────────────────────────────
  function updateMinimap() {
    if (!img.naturalWidth) return;
    const mmW = minimap.clientWidth;
    const mmH = minimap.clientHeight;
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const mmRatio  = mmW / mmH;
 
    let renderedW, renderedH, offsetX = 0, offsetY = 0;
    if (imgRatio > mmRatio) {
      renderedW = mmW;
      renderedH = mmW / imgRatio;
      offsetY = (mmH - renderedH) / 2;
    } else {
      renderedH = mmH;
      renderedW = mmH * imgRatio;
      offsetX = (mmW - renderedW) / 2;
    }
 
    const scaleX = renderedW / img.naturalWidth;
    const scaleY = renderedH / img.naturalHeight;
 
    const ww = wrapper.clientWidth;
    const wh = wrapper.clientHeight;
 
    const vpX = (-originX / scale) * scaleX + offsetX;
    const vpY = (-originY / scale) * scaleY + offsetY;
    const vpW = (ww / scale) * scaleX;
    const vpH = (wh / scale) * scaleY;
 
    mmVP.style.left   = Math.max(offsetX, Math.min(offsetX + renderedW - 4, vpX)) + 'px';
    mmVP.style.top    = Math.max(offsetY, Math.min(offsetY + renderedH - 4, vpY)) + 'px';
    mmVP.style.width  = Math.min(vpW, renderedW) + 'px';
    mmVP.style.height = Math.min(vpH, renderedH) + 'px';
  }
 
  // ── Fit to screen ────────────────────────────────────────────
  function fitToScreen() {
    if (!img.naturalWidth) return;
    const ww = wrapper.clientWidth  - 40;
    const wh = wrapper.clientHeight - 40;
    const scaleX = ww / img.naturalWidth;
    const scaleY = wh / img.naturalHeight;
    scale = Math.min(scaleX, scaleY);
    scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
    const scaledW = img.naturalWidth  * scale;
    const scaledH = img.naturalHeight * scale;
    originX = (wrapper.clientWidth  - scaledW) / 2;
    originY = (wrapper.clientHeight - scaledH) / 2;
    applyTransform(true);
  }
 
  function resetView() {
    scale = 1;
    originX = (wrapper.clientWidth  - img.naturalWidth)  / 2;
    originY = (wrapper.clientHeight - img.naturalHeight) / 2;
    applyTransform(true);
  }
 
  // ── Zoom at point ────────────────────────────────────────────
  function zoomAt(newScale, clientX, clientY) {
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
    const rect = wrapper.getBoundingClientRect();
    const px = clientX - rect.left;
    const py = clientY - rect.top;
    originX = px - (px - originX) * (newScale / scale);
    originY = py - (py - originY) * (newScale / scale);
    scale = newScale;
    clampOrigin();
    applyTransform();
  }
 
  // ── Mouse wheel zoom ─────────────────────────────────────────
  wrapper.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1 + ZOOM_STEP : 1 - ZOOM_STEP;
    zoomAt(scale * factor, e.clientX, e.clientY);
  }, { passive: false });
 
  // ── Mouse drag pan ───────────────────────────────────────────
  wrapper.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startOriginX = originX;
    startOriginY = originY;
    wrapper.classList.add('grabbing');
  });
 
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    originX = startOriginX + (e.clientX - startX);
    originY = startOriginY + (e.clientY - startY);
    clampOrigin();
    applyTransform();
  });
 
  window.addEventListener('mouseup', () => {
    isDragging = false;
    wrapper.classList.remove('grabbing');
  });
 
  // ── Touch support ────────────────────────────────────────────
  let lastTouchDist = null;
  let touchStartOriginX, touchStartOriginY, touchStartX, touchStartY;
  let touchStartScale;
 
  wrapper.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startOriginX = originX;
      startOriginY = originY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      touchStartScale = scale;
      touchStartOriginX = originX;
      touchStartOriginY = originY;
      touchStartX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      touchStartY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    }
    e.preventDefault();
  }, { passive: false });
 
  wrapper.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && isDragging) {
      originX = startOriginX + (e.touches[0].clientX - startX);
      originY = startOriginY + (e.touches[0].clientY - startY);
      clampOrigin();
      applyTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, touchStartScale * (dist / lastTouchDist)));
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = wrapper.getBoundingClientRect();
      const px = midX - rect.left;
      const py = midY - rect.top;
      originX = px - (px - touchStartOriginX) * (newScale / touchStartScale);
      originY = py - (py - touchStartOriginY) * (newScale / touchStartScale);
      scale = newScale;
      clampOrigin();
      applyTransform();
    }
  }, { passive: false });
 
  wrapper.addEventListener('touchend', () => {
    isDragging = false;
    lastTouchDist = null;
  });
 
  // ── Buttons ──────────────────────────────────────────────────
  document.getElementById('zoomIn').addEventListener('click', () => {
    const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
    zoomAt(scale * (1 + ZOOM_STEP), cx, cy);
  });
 
  document.getElementById('zoomOut').addEventListener('click', () => {
    const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
    zoomAt(scale * (1 - ZOOM_STEP), cx, cy);
  });
 
  document.getElementById('resetBtn').addEventListener('click', resetView);
  document.getElementById('fitBtn').addEventListener('click', fitToScreen);
 
  slider.addEventListener('input', () => {
    const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
    zoomAt(parseFloat(slider.value), cx, cy);
  });
 
  // ── Keyboard shortcuts ───────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === '+' || e.key === '=') {
      const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
      zoomAt(scale * (1 + ZOOM_STEP), cx, cy);
    } else if (e.key === '-') {
      const cx = wrapper.clientWidth / 2, cy = wrapper.clientHeight / 2;
      zoomAt(scale * (1 - ZOOM_STEP), cx, cy);
    } else if (e.key === '0') {
      fitToScreen();
    } else if (e.key === 'r' || e.key === 'R') {
      resetView();
    } else if (e.key === 'ArrowLeft')  { originX += 40; clampOrigin(); applyTransform(); }
      else if (e.key === 'ArrowRight') { originX -= 40; clampOrigin(); applyTransform(); }
      else if (e.key === 'ArrowUp')    { originY += 40; clampOrigin(); applyTransform(); }
      else if (e.key === 'ArrowDown')  { originY -= 40; clampOrigin(); applyTransform(); }
  });
 
  // ── Toast helper ─────────────────────────────────────────────
  function showToast(msg) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.add('show');
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
  }
 
  // ── Init ─────────────────────────────────────────────────────
  img.addEventListener('load', () => {
    fitToScreen();
    setTimeout(() => showToast('Tip: scroll to zoom · drag to pan · pinch on mobile'), 600);
  });
 
  img.addEventListener('error', () => {
    canvas.innerHTML = `
      <div style="padding:40px; text-align:center; font-family:'DM Sans',sans-serif; color:#555; max-width:420px; background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
        <div style="font-size:3rem; margin-bottom:16px;">🗺️</div>
        <h2 style="color:#1a7a3c; margin-bottom:12px; font-size:1.1rem;">Map image not found</h2>
        <p style="font-size:0.85rem; line-height:1.6;">Make sure the map image file is in the <strong>same folder</strong> as this HTML file and is named:<br/><br/>
        <code style="background:#f0f4f0; padding:4px 8px; border-radius:4px; font-size:0.9rem;">SY_STEM_FAIR_2026_map.png</code></p>
      </div>`;
    canvas.style.position = 'relative';
    canvas.style.left = '50%';
    canvas.style.top = '50%';
    canvas.style.transform = 'translate(-50%, -50%)';
  });
 
  window.addEventListener('resize', fitToScreen);
</script>
</body>
</html>
